name: Deploy to production

# Runner auto-hébergé (le PC de l'utilisateur) plutôt qu'un runner GitHub
# hébergé : O2Switch bloque silencieusement les connexions SSH entrantes
# depuis les plages IP des runners GitHub (confirmé : TCP connect sur le
# port 22 timeout côté runner hébergé), mais accepte celles venant de l'IP
# habituelle de l'utilisateur. Déclenchement toujours manuel — l'utilisateur
# doit démarrer le runner (run.cmd) avant de lancer ce workflow.
on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # npm install plutôt que npm ci : sharp (devDependency, script ponctuel
      # de génération d'icônes, jamais utilisé au build) tire des paquets
      # optionnels différents selon la plateforme, ce qui fait dériver
      # package-lock.json — npm ci est trop strict pour ce cas.
      - name: Build frontend
        run: |
          npm install
          npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # Pas de rsync (pas dispo nativement sur le runner Windows) : tar+ssh
      # donne le même résultat (miroir complet, gère les dotfiles comme
      # .htaccess) sans dépendance supplémentaire. On vide le dossier avant
      # de réextraire pour ne pas laisser traîner d'anciens bundles JS/CSS
      # (noms de fichiers hashés par Vite à chaque build).
      - name: Deploy frontend (dist/ -> ~/lexora-jeu.fr)
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "find ~/lexora-jeu.fr -mindepth 1 -delete"
          tar -C dist -czf - . | ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "tar -xzf - -C ~/lexora-jeu.fr"

      # node_modules et .env ne sont jamais touchés : exclus du tar source ET
      # jamais supprimés côté serveur (le find ne cible que les autres
      # entrées à la racine de ~/lexora.api).
      - name: Deploy backend (server/ -> ~/lexora.api)
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "find ~/lexora.api -mindepth 1 -maxdepth 1 ! -name node_modules ! -name .env -exec rm -rf {} +"
          tar -C server --exclude=node_modules --exclude=.env -czf - . | \
            ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "tar -xzf - -C ~/lexora.api"

      # touch tmp/restart.txt déclenche un redémarrage gracieux de l'app par
      # Phusion Passenger (le moteur derrière le Node.js Selector de cPanel),
      # sans passer par l'UI ou l'API cPanel.
      - name: Install backend dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'source ~/nodevenv/lexora.api/24/bin/activate && cd ~/lexora.api && npm install --omit=dev && mkdir -p tmp && touch tmp/restart.txt'
